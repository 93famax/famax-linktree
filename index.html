<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Famax — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #00BCD4;
      --bg: #090909;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* Ambient glow */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; top: -150px; left: -150px; background: rgba(0,188,212,0.1); }
    .orb-2 { width: 350px; height: 350px; bottom: -50px; right: -100px; background: rgba(0,150,180,0.09); }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      margin: 0 auto;
      padding: 64px 20px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Avatar */
    .avatar-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid rgba(0,188,212,0.55);
      overflow: hidden;
      box-shadow: 0 0 50px rgba(0,188,212,0.2), 0 0 0 6px rgba(0,188,212,0.06);
      margin-bottom: 22px;
      animation: fadeDown 0.6s ease both;
    }
    .avatar-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: grayscale(20%);
    }

    /* Name */
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(52px, 14vw, 72px);
      letter-spacing: 10px;
      color: #fff;
      line-height: 0.9;
      animation: fadeDown 0.6s 0.1s ease both;
    }
    .name span { color: var(--orange); }

    .tagline {
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.28);
      text-transform: uppercase;
      font-weight: 300;
      margin-top: 10px;
      animation: fadeDown 0.6s 0.2s ease both;
    }

    .divider {
      width: 1px;
      height: 44px;
      background: linear-gradient(to bottom, transparent, rgba(0,188,212,0.45), transparent);
      margin: 26px 0 28px;
      animation: fadeDown 0.6s 0.3s ease both;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      text-decoration: none;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.025);
      transition: all 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(18px);
      animation: slideIn 0.45s ease forwards;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, var(--c), transparent);
      opacity: 0;
      transition: opacity 0.22s ease;
    }
    .link-btn:hover::before { opacity: 0.07; }

    .link-btn:hover {
      border-color: var(--c);
      transform: translateX(7px) scale(1.004) !important;
      background: rgba(255,255,255,0.045);
      box-shadow: -4px 0 24px -5px var(--c);
    }

    .icon-box {
      width: 42px;
      height: 42px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      transition: all 0.22s ease;
      color: var(--c);
    }
    .link-btn:hover .icon-box {
      background: var(--c);
      border-color: var(--c);
      color: #fff;
    }

    .link-text { flex: 1; }
    .link-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 21px;
      letter-spacing: 2px;
      color: #fff;
      line-height: 1;
    }
    .link-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.32);
      letter-spacing: 0.4px;
      margin-top: 3px;
      font-weight: 300;
    }

    .arrow {
      color: rgba(255,255,255,0.14);
      font-size: 16px;
      transition: all 0.22s ease;
      flex-shrink: 0;
    }
    .link-btn:hover .arrow {
      color: var(--c);
      transform: translateX(4px);
    }

    .footer {
      margin-top: 52px;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.09);
      text-transform: uppercase;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Staggered delays */
    .link-btn:nth-child(1)  { animation-delay: 0.35s; }
    .link-btn:nth-child(2)  { animation-delay: 0.46s; }
    .link-btn:nth-child(3)  { animation-delay: 0.57s; }
    .link-btn:nth-child(4)  { animation-delay: 0.68s; }
    .link-btn:nth-child(5)  { animation-delay: 0.79s; }
    .link-btn:nth-child(6)  { animation-delay: 0.90s; }
    .link-btn:nth-child(7)  { animation-delay: 1.01s; }
    .link-btn:nth-child(8)  { animation-delay: 1.12s; }
    .link-btn:nth-child(9)  { animation-delay: 1.23s; }
  </style>
</head>
